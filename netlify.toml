# Netlify reads this file at build time.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Clean URLs: /api/trip  ->  /.netlify/functions/trip
# This rule must stay above any catch-all redirect you add later.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200