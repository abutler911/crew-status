  <ellipse cx="60" cy="60" rx="10.5" ry="27" stroke="#8a8178" stroke-width="1.3" opacity="0.8"/>
  <g transform="translate(49 53) scale(0.5) translate(-12 -12)">
    <path fill="#c8324a" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
