<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none">
  <!-- Where in the world is Babe-a? — globe, orbiting plane, heart for home.
       Standalone copy of the WorldLogo component in src/App.jsx; this one
       carries fixed colors and its own animation so it works as a plain <img>. -->
  <style>
    .spin { transform-origin: 60px 60px; animation: orbit 7s linear infinite; }
    @keyframes orbit { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }
  </style>
  <circle cx="60" cy="60" r="46" stroke="#8a8178" stroke-width="1.4" stroke-dasharray="1.5 7" stroke-linecap="round" opacity="0.7"/>
  <circle cx="60" cy="60" r="27" stroke="#6b635a" stroke-width="2.4"/>
